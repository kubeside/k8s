apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ctf
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: master
  secretRef:
    name: ctf-key
  url: ssh://git@github.com/kubeside/ctf
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ctf
  namespace: flux-system
spec:
  interval: 1m0s
  prune: true
  sourceRef:
    kind: GitRepository
    name: ctf
