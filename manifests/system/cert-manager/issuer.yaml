apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt
  namespace: cert-manager-system
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "larsoien67@gmail.com"
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - dns01:
          webhook:
            groupName: api.domeneshop.no
            solverName: domeneshop
            config:
              APITokenSecretRef:
                key: APIToken
                name: domeneshop
              APISecretSecretRef:
                key: APISecret
                name: domeneshop
        selector:
          dnsZones:
            - "imavgs.no"
            - "nerd.imavgs.no"
            - "k8s.imavgs.no"
