apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: postgres-system
spec:
  chart:
    spec:
      chart: cluster
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cnpg
  interval: 1m0s
  values:
    version:
      postgresql: "18"
    cluster:
      instances: 1
      imageCatalogRef:
        kind: ImageCatalog
        name: imagecatalog
      storage:
        storageClass: postgres
      roles:
        - name: grafana
          createdb: false
          login: true
          passwordSecret: 
            name: grafana-db-auth
