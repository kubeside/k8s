# The longhorn-role clusterrole lacks permission for something
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    kubernetes.io/description: |-
      Fixes permissions for the Longhorn service account related to VolumeAttributesClass.
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  name: system:serviceaccount:longhorn-service-account
  namespace: longhorn-system
rules:
  - apiGroups: ["storage.k8s.io"]
    resources:
      - volumeattributesclasses
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:serviceaccount:longhorn-service-account
  namespace: longhorn-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:serviceaccount:longhorn-service-account
subjects:
  - kind: ServiceAccount
    name: longhorn-service-account
    namespace: longhorn-system