apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: artists-api
  namespace: reverse-proxy-app
spec:
  parentRefs:
    - name: http-gateway
      namespace: gateways-system
  hostnames:
    - artists-api.imavgs.no
  rules:
    - backendRefs:
        - name: artists-api
          port: 4300
---
apiVersion: v1
kind: Service
metadata:
  name: artists-api
  namespace: reverse-proxy-app
spec:
  ports:
    - protocol: TCP
      port: 4300
      targetPort: 4300
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: artists-api
  namespace: reverse-proxy-app
  labels:
    kubernetes.io/service-name: artists-api
addressType: IPv4
ports:
  - name: http
    appProtocol: http
    protocol: TCP
    port: 8100
endpoints:
  - addresses:
      - "10.0.0.124"
    conditions:
      ready: true
      serving: true
      terminating: false
