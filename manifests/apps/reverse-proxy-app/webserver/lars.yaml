apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webserver-lars
  namespace: reverse-proxy-app
spec:
  parentRefs:
    - name: http-gateway
      namespace: gateways-system
  hostnames:
    - webserver-lars.imavgs.no
  rules:
    - backendRefs:
        - name: webserver-lars
          port: 4280
---
apiVersion: v1
kind: Service
metadata:
  name: webserver-lars
  namespace: reverse-proxy-app
spec:
  ports:
    - protocol: TCP
      port: 4280
      targetPort: 4280
---
apiVersion: v1
kind: Endpoints
metadata:
  name: webserver-lars
  namespace: reverse-proxy-app
subsets:
- addresses:
  - ip: "10.0.0.124"
  ports:
  - port: 4280
    protocol: TCP

