apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: local-only
  namespace: netboot-app
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: netboot-dash
  authorization:
    defaultAction: deny
    rules:
      - action: Allow
        principal:
          clientCIDRs:
            - 10.0.0.0/15